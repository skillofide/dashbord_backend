name: Deploy Backend → ECR + ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  build-and-push:
    name: Build & Push all service images to ECR
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Each service maps to: its Dockerfile path and its ECR repo name
        service:
          - name: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - name: problem-service
            dockerfile: services/problem-service/Dockerfile
          - name: submission-service
            dockerfile: services/submission-service/Dockerfile
          - name: progress-service
            dockerfile: services/progress-service/Dockerfile
          - name: execution-service
            dockerfile: services/execution-service/Dockerfile
          - name: notification-service
            dockerfile: services/notification-service/Dockerfile
          - name: user-service
            dockerfile: services/user-service/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push ${{ matrix.service.name }}
        env:
          IMAGE_TAG: ${{ github.sha }}
          REPO: ${{ env.ECR_REGISTRY }}/skillofide-${{ matrix.service.name }}
        run: |
          docker build \
            -f ${{ matrix.service.dockerfile }} \
            -t $REPO:$IMAGE_TAG \
            -t $REPO:latest \
            .
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:latest

  # Build the code-runner sandbox images used by execution-service
  build-runners:
    name: Build & Push code runner images
    runs-on: ubuntu-latest
    needs: build-and-push

    strategy:
      matrix:
        runner:
          - python
          - javascript
          - java
          - cpp

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push runner-${{ matrix.runner }}
        env:
          REPO: ${{ env.ECR_REGISTRY }}/skillofide-runner-${{ matrix.runner }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REPO:$IMAGE_TAG \
            -t $REPO:latest \
            services/execution-service/runners/${{ matrix.runner }}
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:latest

  deploy:
    name: Deploy to EC2 (Docker Compose)
    runs-on: ubuntu-latest
    needs: [build-and-push, build-runners]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Package and Copy files to EC2
        run: |
          tar -czf migrations.tar.gz services/problem-service/migrations services/submission-service/migrations services/progress-service/migrations
          scp docker-compose.yml docker-compose.prod.yml migrations.tar.gz ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/app/

      - name: SSH and Deploy
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "
            # Login to ECR on the EC2 host
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            
            # Go to app dir
            cd ~/app
            
            # Unpack migrations and clean up archive
            tar -xzf migrations.tar.gz
            rm migrations.tar.gz
            
            # Pull latest microservice & runner images
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml pull
            
            # Recreate containers with new images
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
          "


