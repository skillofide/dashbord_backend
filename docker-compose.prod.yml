# ==========================================================================
# Production docker-compose overrides for dashbord_backend
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# RDS Endpoint: skillofide-db.czisgkemmwll.ap-south-1.rds.amazonaws.com
# All secrets come from environment variables.
# ==========================================================================

services:
  # ─── Infrastructure overrides ─────────────────────────────────────────────
  postgres:
    # Disable local postgres in production to save resource since we use Amazon RDS.
    deploy:
      replicas: 0

  db-migrate:
    entrypoint:
      - sh
      - -c
      - |
        /migrate -path=/migrations/problem-service -database "$${POSTGRES_DSN}&x-migrations-table=schema_migrations_problem" up && \
        /migrate -path=/migrations/submission-service -database "$${POSTGRES_DSN}&x-migrations-table=schema_migrations_submission" up && \
        /migrate -path=/migrations/progress-service -database "$${POSTGRES_DSN}&x-migrations-table=schema_migrations_progress" up

  redis:
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --requirepass ${REDIS_PASSWORD}
    ports: []   # No external exposure — internal only

  nats:
    restart: always
    ports: []   # No external exposure — internal only

  # ─── Microservice overrides ───────────────────────────────────────────────
  problem-service:
    image: ${ECR_REGISTRY}/skillofide-problem-service:latest
    build: ~
    restart: always
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN}
      REDIS_ADDR: ${REDIS_ADDR}
      LOG_LEVEL: warn

  execution-service:
    image: ${ECR_REGISTRY}/skillofide-execution-service:latest
    build: ~
    restart: always
    environment:
      PROBLEM_SERVICE_ADDR: problem-service:50051
      NATS_URL: ${NATS_URL}
      LOG_LEVEL: warn

  submission-service:
    image: ${ECR_REGISTRY}/skillofide-submission-service:latest
    build: ~
    restart: always
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN}
      NATS_URL: ${NATS_URL}
      LOG_LEVEL: warn

  progress-service:
    image: ${ECR_REGISTRY}/skillofide-progress-service:latest
    build: ~
    restart: always
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN}
      REDIS_ADDR: ${REDIS_ADDR}
      LOG_LEVEL: warn

  notification-service:
    image: ${ECR_REGISTRY}/skillofide-notification-service:latest
    build: ~
    restart: always
    environment:
      NATS_URL: ${NATS_URL}
      LOG_LEVEL: warn

  user-service:
    image: ${ECR_REGISTRY}/skillofide-user-service:latest
    build: ~
    restart: always
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN}
      LOG_LEVEL: warn

  api-gateway:
    image: ${ECR_REGISTRY}/skillofide-api-gateway:latest
    build: ~
    restart: always
    environment:
      HTTP_PORT: "8080"
      PROBLEM_SERVICE_ADDR: problem-service:50051
      SUBMISSION_SERVICE_ADDR: submission-service:50053
      EXECUTION_SERVICE_ADDR: execution-service:50052
      PROGRESS_SERVICE_ADDR: progress-service:50054
      USER_SERVICE_ADDR: user-service:50055
      NOTIFICATION_SERVICE_URL: http://notification-service:8081
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEV_MODE: "false"
      LOG_LEVEL: warn
