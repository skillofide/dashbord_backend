apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: skillofide
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: skillofide/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: PROBLEM_SERVICE_ADDR
              value: problem-service:50051
            - name: SUBMISSION_SERVICE_ADDR
              value: submission-service:50053
            - name: EXECUTION_SERVICE_ADDR
              value: execution-service:50052
            - name: PROGRESS_SERVICE_ADDR
              value: progress-service:50054
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8081
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: JWT_SECRET
            - name: DEV_MODE
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: skillofide
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secret
  namespace: skillofide
type: Opaque
stringData:
  JWT_SECRET: "replace-with-strong-secret-in-production"
