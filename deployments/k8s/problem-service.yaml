apiVersion: apps/v1
kind: Deployment
metadata:
  name: problem-service
  namespace: skillofide
spec:
  replicas: 2
  selector:
    matchLabels:
      app: problem-service
  template:
    metadata:
      labels:
        app: problem-service
    spec:
      containers:
        - name: problem-service
          image: skillofide/problem-service:latest
          ports:
            - containerPort: 50051
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DSN
            - name: REDIS_ADDR
              value: redis:6379
            - name: LOG_LEVEL
              value: info
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: problem-service
  namespace: skillofide
spec:
  selector:
    app: problem-service
  ports:
    - port: 50051
      targetPort: 50051
