apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: skillofide
data:
  POSTGRES_DB: skillofide
  POSTGRES_USER: skillofide
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: skillofide
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-in-production"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: skillofide
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: skillofide
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "skillofide"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: skillofide
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
