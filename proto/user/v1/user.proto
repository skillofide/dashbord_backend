syntax = "proto3";

package user.v1;

option go_package = "skillofide/proto/user/v1;userv1";

service UserService {
  rpc VerifyUser(VerifyUserRequest) returns (VerifyUserResponse);
  rpc CreateOrUpdateUser(CreateOrUpdateUserRequest) returns (CreateOrUpdateUserResponse);
}

message VerifyUserRequest {
  string email = 1;
  string password = 2;
}

message VerifyUserResponse {
  string id = 1;
  string email = 2;
  string name = 3;
  string role = 4;
}

message CreateOrUpdateUserRequest {
  string email = 1;
  string name = 2;
  string password = 3;
  string role = 4;
}

message CreateOrUpdateUserResponse {
  bool success = 1;
  string message = 2;
}
